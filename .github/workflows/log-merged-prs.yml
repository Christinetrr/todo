name: Log merged pull requests

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: read

jobs:
  append-readme-log:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base branch (merge target)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Append merged PR to README
        uses: actions/github-script@v7
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          script: |
            const fs = require('fs')
            const pr = context.payload.pull_request

            const reviews = await github.paginate(github.rest.pulls.listReviews, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            })

            const approved = reviews.some((r) => r.state === 'APPROVED')
            if (!approved) {
              core.info('Skipping README log: no APPROVED review on this PR.')
              return
            }

            const author = pr.user.login
            const mergedAt = pr.merged_at
            const date = mergedAt
              ? mergedAt.slice(0, 10)
              : new Date().toISOString().slice(0, 10)
            const title = pr.title.replace(/\r?\n/g, ' ').trim()
            const prNum = process.env.PR_NUMBER
            const bullet = `- @${author} — ${date} — ${title} (#${prNum})\n`

            const path = 'README.md'
            let readme = fs.readFileSync(path, 'utf8')
            const header = '## Merged pull requests'
            if (!readme.includes(header)) {
              readme = readme.replace(/\s*$/, '') + '\n\n' + header + '\n\n' + bullet
            } else {
              readme = readme.replace(/\s*$/, '') + '\n' + bullet
            }
            fs.writeFileSync(path, readme)

      - name: Commit and push README
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          if git diff --staged --quiet; then
            echo "No README changes (skipped or empty)."
            exit 0
          fi
          git commit -m "docs: log merged PR #${{ github.event.pull_request.number }} in README"
          git push
